<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple AI Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <section id="loginPanel" class="login-panel" aria-labelledby="loginTitle">
      <div class="login-card">
        <p class="eyebrow">Student Support</p>
        <h1 id="loginTitle">Login</h1>
        <form id="loginForm" class="login-form">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" type="text" autocomplete="username" required />

          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" autocomplete="current-password" required />

          <button type="submit">Login</button>
          <p id="loginStatus" class="login-status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section id="chatPanel" class="chat-panel hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">Student Support</p>
        <h1>AI Assistant</h1>
      </div>
      <button type="button" id="logoutBtn" class="btn-secondary">Logout</button>
      <!-- Gemini API Key Panel -->
      <div class="api-key-box">
        <label for="apiKeyInput">Gemini API Key</label>
        <div class="api-key-row">
          <input
            id="apiKeyInput"
            type="password"
            placeholder="Paste your Gemini API key..."
            autocomplete="off"
          />
          <button type="button" id="saveKeyBtn">Save</button>
          <button type="button" id="clearKeyBtn" class="btn-danger">Clear</button>
        </div>
        <p id="keyStatus" class="key-status"></p>
      </div>
    </header>


    <main class="chat-card">
      <div id="chatMessages" class="messages" aria-live="polite"></div>

      <div class="mode-selector">
        <button type="button" class="mode-btn active" data-mode="general">General</button>
        <button type="button" class="mode-btn" data-mode="academic">Academic</button>
        <button type="button" class="mode-btn" data-mode="internship">Internship</button>
      </div>

      <form id="chatForm" class="composer">
        <input id="messageInput" type="text" placeholder="Ask anything..." autocomplete="off" required />
        <button type="submit">Send</button>
      </form>
    </main>
    </section>
  </div>

  <script src="app.js"></script>
</body>

</html>
