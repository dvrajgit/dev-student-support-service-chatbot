<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple AI Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Student Support</p>
          <h1>AI Assistant</h1>
        </div>
        <!-- Gemini API key input removed -->
      </header>

      <main class="chat-card">
        <div id="chatMessages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            type="text"
            placeholder="Ask anything..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
